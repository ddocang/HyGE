<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HyGE - Login</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background: url('./image/background.png') no-repeat center center fixed;
        background-size: cover;
        font-family: 'Pretendard', sans-serif;
      }

      .container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 1;
        flex-direction: row;
        gap: 500px;
        padding: 20px;
      }

      .welcome-section,
      .login-box {
        max-height: 100%;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="welcome-section">
        <h1>WELCOME !</h1>
        <div class="logo">
          <img src="image/hyge-logo.png" alt="HyGE" />
          <h2>HyGE</h2>
        </div>
      </div>

      <div class="login-box">
        <div class="login-title">
          <h1>HyGE</h1>
        </div>
        <p class="subtitle">관리자 서비스 이용을 위해 로그인해 주세요.</p>

        <form class="login-form" onsubmit="handleLogin(event)">
          <div class="input-group">
            <input type="email" placeholder="felix.park@gtc-eng.com" />
          </div>
          <div class="input-group">
            <input type="password" placeholder="••••••••••" />
            <div class="password-toggle">
              <input type="checkbox" id="showPassword" />
            </div>
          </div>
          <button
            type="button"
            class="login-btn"
            onclick="window.location.href='main.html'"
          >
            로그인
          </button>
          <button
            type="button"
            class="guest-btn"
            onclick="window.location.href='main.html'"
          >
            안전모니터링
          </button>
        </form>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
    <script>
      function handleLogin(event) {
        event.preventDefault(); // 폼 기본 제출 동작 방지
        window.location.href = 'main.html'; // main.html로 페이지 이동
      }
    </script>
  </body>
</html>
