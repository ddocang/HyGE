    <script type="text/javascript">
      window.onload = function () {
        alert('테스트');
      };
    </script>
    <script type="text/javascript">
      window.onload = function () {
        const searchInput = document.getElementById('menuSearch');

        searchInput.addEventListener('keyup', function (event) {
          if (event.key === 'Enter') {
            const searchText = this.value
              .trim()
              .toLowerCase()
              .replace(/\s+/g, '');
            const menuItems = document.querySelectorAll('.sidebar .menu-item');
            let found = false;

            menuItems.forEach((item) => {
              const menuText = item.textContent
                .trim()
                .toLowerCase()
                .replace(/\s+/g, '');
              if (menuText.includes(searchText)) {
                found = true;
                // 메뉴 클릭 이벤트 실행
                const link = item.querySelector('a'); // 메뉴 아이템 내의 링크 찾기
                if (link) {
                  link.click(); // 링크 클릭
                } else {
                  item.click(); // 링크가 없으면 메뉴 아이템 직접 클릭
                }
                this.value = ''; // 검색창 비우기
                this.blur(); // 검색창 포커스 해제
              }
            });

            if (!found) {
              alert('일치하는 메뉴가 없습니다.');
            }
          }
        });
      };
    </script>
    <style>

        top: 50%;
        transform: translateY(-50%);

        height: 20px;

      .price-table th::before,
      .price-table th::after {
        content: '';

        width: 0;

        border-left: 4px solid transparent;

      .price-table th::before {

    <!-- 네이버 지도 스크립트 수정 -->
    <script
      type="text/javascript"
      src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=9biw41sxac"
    ></script>

    <!-- 지도 초기화 스크립트 수정 -->
    <script>
      const map = new naver.maps.Map('map', {
        center: new naver.maps.LatLng(37.458921, 129.173047), // 삼척교동 중심
        zoom: 13,
        mapTypeControl: true,
        zoomControl: false, // 줌 컨트롤 비활성화
      });

      // 충전소 상세 정보
      const stations = [
        {
          title: '삼척교동수소충전복합스테이션',
          tel: '033-570-3114',
          address: '강원특별자치도 삼척시 교동 720-1',
          position: new naver.maps.LatLng(37.458921, 129.173047),
          image: 'image/station1.png',
        },
        {
          title: '삼척수소충전소',
          tel: '033-570-3115',
          address: '강원특별자치도 삼척시 오분동 142',
          position: new naver.maps.LatLng(37.429574, 129.18289),
          image: 'image/station2.png',
        },
        {
          title: '속초수소충전소',
          tel: '033-631-1114',
          address: '강원특별자치도 속초시 대포동 978-1',
          position: new naver.maps.LatLng(38.207014, 128.591931),
          image: 'image/station3.png',
        },
        {
          title: '원주수소충전소',
          tel: '033-731-1114',
          address: '강원특별자치도 원주시 태장동 1720-1',
          position: new naver.maps.LatLng(37.342697, 127.959319),
          image: 'image/station4.png',
        },
      ];

      // 전역 변수로 마커와 정보창 저장을 위한 객체
      let markers = {};
      let infowindows = {};
      let currentInfowindow = null;

      // 사이드바 메뉴 클릭 이벤트 추가
      function addMenuClickEvent() {
        const menuItems = document.querySelectorAll('.menu-item');
        menuItems.forEach((item, index) => {
          item.addEventListener('click', () => {
            const station = stations[index];

            // 이전 정보창 닫기
            if (currentInfowindow) {
              currentInfowindow.close();
            }

            // 해당 마커로 지도 이동
            map.setCenter(station.position);
            map.setZoom(12); // 줌 레벨 조정 (1~20 사이 값, 숫자가 클수록 더 가깝게 줌인)
            // 예: 14 = 멀리서 보기, 16 = 중간, 18 = 가깝게, 20 = 아주 가깝게

            // 해당 마커의 정보창 열기
            const infowindow = infowindows[station.title];
            infowindow.open(map, markers[station.title]);
            currentInfowindow = infowindow;
          });
        });
      }

      // 마커와 정보창 생성 부분 수정
      stations.forEach((station) => {
        // 마커 생성
        const marker = new naver.maps.Marker({
          position: station.position,
          map: map,
          title: station.title,
          animation: naver.maps.Animation.DROP,
        });

        // 정보창 생성
        const infowindow = new naver.maps.InfoWindow({
          content: `
            <div style="
              background-color: white;
              border-radius: 16px;
              padding: 24px;
              min-width: 420px;
              height: 300px;
              font-family: Pretendard;
              position: relative;
              box-shadow: 0 4px 16px rgba(0,0,0,0.12);
              margin: -10px;
              overflow-y: auto;
            ">
              <!-- 이미지 컨테이너 -->
              <div style="
                position: absolute;
                top: 24px;
                right: 24px;
                display: flex;
                flex-direction: column;
                gap: 12px;
                align-items: center;
              ">
                <div style="
                  width: 120px;
                  height: 120px;
                  border-radius: 12px;
                  overflow: hidden;
                  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                ">
                  <img src="${station.image}" alt="${station.title}" 
                       style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <button onclick="getCurrentPositionAndNavigate(${station.position.lat()}, ${station.position.lng()}, '${
            station.title
          }')" style="
                  background: linear-gradient(135deg, #2196F3, #1976D2);
                  border: none;
                  border-radius: 8px;
                  color: white;
                  padding: 8px 16px;
                  font-family: Pretendard;
                  font-size: 13px;
                  font-weight: 600;
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  width: 120px;
                  justify-content: center;
                  transition: all 0.2s ease;
                  box-shadow: 0 2px 6px rgba(33, 150, 243, 0.3);
                ">
                  <i class="fas fa-location-arrow"></i>
                  길찾기
                </button>
                <button onclick="location.href='./monitoring.html?station=${encodeURIComponent(
                  station.title
                )}'" style="
                  background: linear-gradient(135deg, #4CAF50, #388E3C);
                  border: none;
                  border-radius: 8px;
                  color: white;
                  padding: 8px 16px;
                  font-family: Pretendard;
                  font-size: 13px;
                  font-weight: 600;
                  cursor: pointer;
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  width: 120px;
                  justify-content: center;
                  transition: all 0.2s ease;
                  box-shadow: 0 2px 6px rgba(76, 175, 80, 0.3);
                ">
                  <i class="fas fa-external-link-alt"></i>
                  모니터링
                </button>
              </div>
              
              <!-- 텍스트 정보 -->
              <div style="width: calc(100% - 140px);">
                <h3 style="
                  margin: 0 0 20px 0;
                  font-size: 20px;
                  color: #333;
                  font-weight: 600;
                  white-space: nowrap;
                  overflow: hidden;
                  text-overflow: ellipsis;
                ">${station.title}</h3>
                
                <div style="margin: 16px 0;">
                  <div style="
                    display: flex;
                    align-items: center;
                    margin-bottom: 12px;
                  ">
                    <i class="fas fa-phone" style="
                      color: #2196F3;
                      margin-right: 12px;
                      font-size: 16px;
                      flex-shrink: 0;
                    "></i>
                    <div style="width: 100%;">
                      <div style="
                        color: #666;
                        font-size: 13px;
                        margin-bottom: 4px;
                      ">연락처</div>
                      <div style="
                        color: #333;
                        font-size: 15px;
                        font-weight: 500;
                        white-space: nowrap;
                        overflow: hidden;
                        text-overflow: ellipsis;
                      ">${station.tel}</div>
                    </div>
                  </div>
                  
                  <div style="
                    display: flex;
                    align-items: center;
                  ">
                    <i class="fas fa-map-marker-alt" style="
                      color: #2196F3;
                      margin-right: 12px;
                      font-size: 16px;
                      flex-shrink: 0;
                    "></i>
                    <div style="width: 100%;">
                      <div style="
                        color: #666;
                        font-size: 13px;
                        margin-bottom: 4px;
                      ">주소</div>
                      <div style="
                        color: #333;
                        font-size: 15px;
                        font-weight: 500;
                        white-space: nowrap;
                        overflow: hidden;
                        text-overflow: ellipsis;
                      ">${station.address}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `,
          disableAnchor: true,
          borderWidth: 0,
          backgroundColor: 'transparent',
        });

        // 마커 클릭 이벤트
        naver.maps.Event.addListener(marker, 'click', function () {
          if (currentInfowindow) {
            currentInfowindow.close();
          }
          infowindow.open(map, marker);
          currentInfowindow = infowindow;
        });

        // 마커와 정보창을 객체에 저장
        markers[station.title] = marker;
        infowindows[station.title] = infowindow;
      });

      // 지도 클릭 시 정보창 닫기
      naver.maps.Event.addListener(map, 'click', function (e) {
        if (currentInfowindow) {
          currentInfowindow.close();
          currentInfowindow = null;
        }
      });

      // 메뉴 클릭 이벤트 초기화
      addMenuClickEvent();

      // 모든 마커가 보이도록 지도 영역 자동 조정
      const bounds = stations.reduce((bounds, station) => {
        return bounds.extend(station.position);
      }, new naver.maps.LatLngBounds());

      map.fitBounds(bounds);

      // 브라우저의 위치 정보 가져오기
      async function getCurrentLocation() {
        return new Promise((resolve, reject) => {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                resolve({
                  latitude: position.coords.latitude,
                  longitude: position.coords.longitude,
                });
              },
              (error) => {
                console.error('위치 정보를 가져올 수 없습니다:', error);
                reject(error);
              }
            );
          } else {
            reject(new Error('Geolocation이 지원되지 않습니다.'));
          }
        });
      }

      // 정보 업데이트
      async function updateAllInfo() {
        try {
          const position = await getCurrentLocation();
          // 위도/경도 표시
          document.getElementById(
            'current-location'
          ).textContent = `현재 위치 (${position.latitude.toFixed(
            6
          )}, ${position.longitude.toFixed(6)})`;
          getCurrentWeather(position.latitude, position.longitude);
        } catch (error) {
          document.getElementById('current-location').textContent =
            '위치 정보를 가져올 수 없습니다';
        }
      }

      // 날씨 정보 가져오기
      async function getCurrentWeather(latitude, longitude) {
        try {
          const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=4488b4dc99859632928a243349446319&units=metric&lang=kr`
          );
          const data = await response.json();
          const temp = Math.round(data.main.temp);
          const humidity = data.main.humidity;
          document.getElementById(
            'current-weather'
          ).textContent = `${temp}°C / 습도 ${humidity}%`;
        } catch (error) {
          console.error('날씨 정보를 가져올 수 없습니다:', error);
          document.getElementById('current-weather').textContent =
            '날씨 정보 없음';
        }
      }

      // 현재 시간 업데이트
      function updateCurrentTime() {
        const now = new Date();
        const options = {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        };
        document.getElementById('current-time').textContent =
          now.toLocaleTimeString('ko-KR', options);
      }

      // 초기화 및 주기적 업데이트
      document.addEventListener('DOMContentLoaded', () => {
        updateAllInfo(); // 초기 정보 가져오기
        updateCurrentTime(); // 초기 시간 표시
        setInterval(updateCurrentTime, 1000); // 1초마다 시간 업데이트
        setInterval(updateAllInfo, 300000); // 5분마다 위치/날씨 업데이트
      });

      // 하단 정보 표시 영역 스타일 수정
      const bottomInfoStyle = `
      .bottom-info {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 15px 30px;
          background-color: white;
          border-top: 1px solid #eee;
          font-family: Pretendard;
          margin-top: 30px;
      }

      .location-info, .weather-info, .time-info {
          display: flex;
          align-items: center;
          gap: 10px;
          color: #666;
          font-size: 14px;
          white-space: nowrap;
      }

      .bottom-info i {
          color: #2196F3;
          font-size: 16px;
      }
      `;

      // 스타일 추가
      const styleSheet = document.createElement('style');
      styleSheet.innerText = bottomInfoStyle;
      document.head.appendChild(styleSheet);

      // 현재 위치를 가져와서 길찾기 URL을 생성하는 함수 추가
      function getCurrentPositionAndNavigate(destLat, destLng, destName) {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const startLat = position.coords.latitude;
              const startLng = position.coords.longitude;
              const url = `https://map.kakao.com/link/to/${encodeURIComponent(
                destName
              )},${destLat},${destLng}/from/현재위치,${startLat},${startLng}`;
              window.open(url);
            },
            (error) => {
              console.error('위치 정보를 가져올 수 없습니다:', error);
              // 위치 정보를 가져올 수 없는 경우 목적지만 설정
              const url = `https://map.kakao.com/link/to/${encodeURIComponent(
                destName
              )},${destLat},${destLng}`;
              window.open(url);
            }
          );
        } else {
          // 지오로케이션이 지원되지 않는 경우 목적지만 설정
          const url = `https://map.kakao.com/link/to/${encodeURIComponent(
            destName
          )},${destLat},${destLng}`;
          window.open(url);
        }
      }
    </script>

    <script>
      // 정렬 상태를 저장할 변수
      let sortColumn = '';
      let sortDirection = 'asc';

      // 정렬 함수
      function sortTable(column, event) {
        // 클릭된 위치가 정렬 아이콘 영역인지 확인
        const rect = event.target.getBoundingClientRect();
        const clickX = event.clientX - rect.left;

        // 정렬 아이콘 영역(오른쪽 20px)이 아니면 리턴
        if (clickX < rect.width - 25) {
          return;
        }

        const tableBody = document.getElementById('price-table-body');
        const rows = Array.from(tableBody.getElementsByTagName('tr'));

        // 정렬 방향 결정
        if (sortColumn === column) {
          sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          sortColumn = column;
          sortDirection = 'asc';
        }

        // 헤더의 정렬 표시 업데이트
        const headers = document.querySelectorAll('.price-table th');
        headers.forEach((header) => {
          header.classList.remove('sort-asc', 'sort-desc');
          if (header.getAttribute('data-column') === column) {
            header.classList.add(
              sortDirection === 'asc' ? 'sort-asc' : 'sort-desc'
            );
          }
        });

        // 데이터 정렬
        rows.sort((a, b) => {
          let aValue = a.cells[getColumnIndex(column)].textContent.trim();
          let bValue = b.cells[getColumnIndex(column)].textContent.trim();

          if (column === '판매가격') {
            // 가격에서 숫자만 추출하여 비교 (쉼표와 '원' 제거)
            aValue = parseInt(aValue.replace(/[^0-9]/g, '')) || 0;
            bValue = parseInt(bValue.replace(/[^0-9]/g, '')) || 0;
            return sortDirection === 'asc' ? aValue - bValue : bValue - aValue;
          } else if (column === '운영상태') {
            // 운영상태 정렬 ('운영중'이 위로 오도록)
            if (aValue === '운영중' && bValue !== '운영중')
              return sortDirection === 'asc' ? -1 : 1;
            if (aValue !== '운영중' && bValue === '운영중')
              return sortDirection === 'asc' ? 1 : -1;
            return sortDirection === 'asc'
              ? aValue.localeCompare(bValue, 'ko-KR')
              : bValue.localeCompare(aValue, 'ko-KR');
          } else {
            // 충전소명 정렬
            return sortDirection === 'asc'
              ? aValue.localeCompare(bValue, 'ko-KR')
              : bValue.localeCompare(aValue, 'ko-KR');
          }
        });

        // 정렬된 행을 테이블에 다시 추가
        rows.forEach((row) => tableBody.appendChild(row));
      }

      // 컬럼 인덱스 가져오기
      function getColumnIndex(column) {
        switch (column) {
          case '충전소명':
            return 0;
          case '판매가격':
            return 1;
          case '운영상태':
            return 2;
          default:
            return 0;
        }
      }

      async function getHydrogenPrices() {
        const tableBody = document.getElementById('price-table-body');
        if (!tableBody) {
          console.error('테이블 본문을 찾을 수 없습니다.');
          return;
        }

        try {
          // 프록시 서버를 통해 API 호출
          const response = await fetch(
            'http://localhost:3000/api/hydrogen-stations'
          );
          const data = await response.json();
          console.log('API 응답:', data);

          // API 응답이 성공적이지 않은 경우 테스트 데이터 사용
          const stations = data.response?.body?.items || [
            {
              충전소명: '삼척교동수소복합스테이션',
              수소판매가격: 8000,
              운영상태: '운영중',
            },
            {
              충전소명: '삼척 오분동 수소 충전소',
              수소판매가격: 8000,
              운영상태: '운영중',
            },
            {
              충전소명: '속초 수소 충전소',
              수소판매가격: 8200,
              운영상태: '운영중',
            },
            {
              충전소명: '원주 수소 충전소',
              수소판매가격: 8100,
              운영상태: '운영중',
            },
            {
              충전소명: '강릉 수소 충전소',
              수소판매가격: 8300,
              운영상태: '운영중',
            },
            {
              충전소명: '춘천 수소 충전소',
              수소판매가격: 8150,
              운영상태: '점검중',
            },
            {
              충전소명: '동해 수소 충전소',
              수소판매가격: 8250,
              운영상태: '운영중',
            },
            {
              충전소명: '태백 수소 충전소',
              수소판매가격: 8180,
              운영상태: '운영중',
            },
            {
              충전소명: '홍천 수소 충전소',
              수소판매가격: 8120,
              운영상태: '점검중',
            },
            {
              충전소명: '횡성 수소 충전소',
              수소판매가격: 8220,
              운영상태: '운영중',
            },
          ];

          // 테이블 업데이트
          const rows = stations
            .map(
              (station) => `
              <tr>
                <td>${station.충전소명 || '-'}</td>
                <td>${
                  station.수소판매가격
                    ? station.수소판매가격.toLocaleString() + '원'
                    : '-'
                }</td>
                <td class="${
                  station.운영상태 === '운영중'
                    ? 'status-open'
                    : 'status-closed'
                }">${station.운영상태 || '점검중'}</td>
              </tr>
            `
            )
            .join('');

          tableBody.innerHTML =
            rows ||
            `
            <tr>
              <td colspan="3" style="text-align: center">
                데이터가 없습니다.
              </td>
            </tr>`;

          // 이전 정렬 상태가 있으면 다시 정렬
          if (sortColumn) {
            sortTable(sortColumn);
          }
        } catch (error) {
          console.error('데이터를 불러오는 중 오류가 발생했습니다:', error);
          tableBody.innerHTML = `
            <tr>
              <td colspan="3" style="text-align: center; color: red;">
                데이터를 불러오는 중 오류가 발생했습니다.<br>
                잠시 후 다시 시도해주세요.
              </td>
            </tr>
          `;
        }
      }

      // 페이지 로드 시 실행
      document.addEventListener('DOMContentLoaded', () => {
        // 테이블 헤더에 정렬 이벤트 추가
        const headers = document.querySelectorAll('.price-table th');
        headers.forEach((header) => {
          const column = header.textContent.trim();
          header.setAttribute('data-column', column);
          header.addEventListener('click', (event) => sortTable(column, event));
        });

        // 초기 데이터 로드
        getHydrogenPrices();
      });

      // 5분마다 데이터 자동 갱신
      setInterval(getHydrogenPrices, 300000);
    </script>

    <script>
      document
        .getElementById('searchButton')
        .addEventListener('click', function () {
          const searchInput = document.getElementById('menuSearch');
          const searchText = searchInput.value
            .trim()
            .toLowerCase()
            .replace(/\s+/g, '');
          const menuItems = document.querySelectorAll('.sidebar .menu-item');
          let found = false;

          menuItems.forEach((item) => {
            const menuText = item.textContent
              .trim()
              .toLowerCase()
              .replace(/\s+/g, '');
            if (menuText.includes(searchText)) {
              found = true;
              const link = item.querySelector('a');
              if (link) {
                link.click();
              } else {
                item.click();
              }
              searchInput.value = '';
              searchInput.blur();
            }
          });

          if (!found) {
            alert('일치하는 메뉴가 없습니다.');
          }
        });
    </script>
  </body>
</html>
