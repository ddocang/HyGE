    <!-- 지도 초기화 스크립트 -->
    <script>
      let map;
      let stations = [];
      let markers = {};
      let infowindows = {};
      let currentInfowindow = null;

      // 브라우저의 위치 정보 가져오기
      async function getCurrentLocation() {
        return new Promise((resolve, reject) => {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                resolve({
                  latitude: position.coords.latitude,
                  longitude: position.coords.longitude,
                });
              },
              (error) => {
                console.error('위치 정보를 가져올 수 없습니다:', error);
                reject(error);
              }
            );
          } else {
            reject(new Error('Geolocation이 지원되지 않습니다.'));
          }
        });
      }

      // 정보 업데이트
      async function updateAllInfo() {
        try {
          const position = await getCurrentLocation();
          // 위도/경도 표시
          document.getElementById(
            'current-location'
          ).textContent = `현재 위치 (${position.latitude.toFixed(
            6
          )}, ${position.longitude.toFixed(6)})`;
          getCurrentWeather(position.latitude, position.longitude);
        } catch (error) {
          document.getElementById('current-location').textContent =
            '위치 정보를 가져올 수 없습니다';
        }
      }

      // 날씨 정보 가져오기
      async function getCurrentWeather(latitude, longitude) {
        try {
          const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=4488b4dc99859632928a243349446319&units=metric&lang=kr`
          );
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          const data = await response.json();
          const temp = Math.round(data.main.temp);
          const humidity = data.main.humidity;
          document.getElementById(
            'current-weather'
          ).textContent = `${temp}°C / 습도 ${humidity}%`;
        } catch (error) {
          console.error('날씨 정보를 가져올 수 없습니다:', error);
          document.getElementById('current-weather').textContent =
            '날씨 정보 없음';
        }
      }

      // 현재 시간 업데이트
      function updateCurrentTime() {
        const now = new Date();
        const options = {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        };
        document.getElementById('current-time').textContent =
          now.toLocaleTimeString('ko-KR', options);
      }

      // 충전소 정보를 가져오는 함수
      function fetchStationInfo() {
        console.log('충전소 정보 가져오기 시작');

        // 정적 데이터 사용
        stations = [
          {
            title: '삼척교동수소충전복합스테이션',
            tel: '033-570-3114',
            address: '강원특별자치도 삼척시 교동 720-1',

      function getCurrentPositionAndNavigate(destLat, destLng, destName) {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const startLat = position.coords.latitude;
              const startLng = position.coords.longitude;
              const url = `https://map.kakao.com/link/to/${encodeURIComponent(
                destName
              )},${destLat},${destLng}/from/현재위치,${startLat},${startLng}`;
              window.open(url);
            },
            (error) => {
              console.error('위치 정보를 가져올 수 없습니다:', error);
              const url = `https://map.kakao.com/link/to/${encodeURIComponent(
                destName
              )},${destLat},${destLng}`;
              window.open(url);
            }
          );
        } else {
          const url = `https://map.kakao.com/link/to/${encodeURIComponent(
            destName
          )},${destLat},${destLng}`;
          window.open(url);
        }
      }

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        const searchInput = document.getElementById('menuSearch');
        const searchButton = document.getElementById('searchButton');
        let currentFocus = -1;

        // 자동완성 목록 생성 함수
        function createAutocomplete(value) {
          // 이전 자동완성 목록 제거
          closeAllLists();

          if (!value) return false;

          const searchText = value.toLowerCase().replace(/\s+/g, '');
          const autocompleteDiv = document.createElement('div');
          autocompleteDiv.setAttribute('class', 'autocomplete-items');
          searchInput.parentNode.appendChild(autocompleteDiv);

          // 충전소 목록에서 검색어와 일치하는 항목 찾기
          stations.forEach((station) => {
            const stationText = station.title.toLowerCase().replace(/\s+/g, '');
            if (stationText.includes(searchText)) {
              const itemDiv = document.createElement('div');
              itemDiv.setAttribute('class', 'autocomplete-item');
              itemDiv.innerHTML = `<i class="fas fa-gas-pump"></i>${station.title}`;

              // 항목 클릭 이벤트
              itemDiv.addEventListener('click', function () {
                searchInput.value = station.title;
                closeAllLists();
                moveToStation(station);
              });

              autocompleteDiv.appendChild(itemDiv);
            }
          });
        }

        // 모든 자동완성 목록 닫기
        function closeAllLists(elmnt) {
          const x = document.getElementsByClassName('autocomplete-items');
          for (let i = 0; i < x.length; i++) {
            if (elmnt != x[i] && elmnt != searchInput) {
              x[i].parentNode.removeChild(x[i]);
            }
          }
        }

        // 충전소로 이동하는 함수
        function moveToStation(station) {
          if (currentInfowindow) {
            currentInfowindow.close();
          }

          map.setCenter(station.position);
          map.setZoom(12);

          const infowindow = infowindows[station.title];
          infowindow.open(map, markers[station.title]);
          currentInfowindow = infowindow;

          searchInput.value = '';
          searchInput.blur();
        }

        // 키보드 이벤트 처리
        searchInput.addEventListener('keydown', function (e) {
          let x = document.getElementsByClassName('autocomplete-items')[0];
          if (!x) return;

          let items = x.getElementsByTagName('div');

          if (e.keyCode == 40) {
            // 아래 방향키
            currentFocus++;
            addActive(items);
          } else if (e.keyCode == 38) {
            // 위 방향키
            currentFocus--;
            addActive(items);
          } else if (e.keyCode == 13) {
            // 엔터
            e.preventDefault();
            if (currentFocus > -1) {
              if (items) items[currentFocus].click();
            } else {
              performSearch();
            }
          }
        });

        // 활성 항목 스타일 추가
        function addActive(items) {
          if (!items) return false;
          removeActive(items);
          if (currentFocus >= items.length) currentFocus = 0;
          if (currentFocus < 0) currentFocus = items.length - 1;
          items[currentFocus].classList.add('autocomplete-active');
        }

        // 활성 항목 스타일 제거
        function removeActive(items) {
          for (let i = 0; i < items.length; i++) {
            items[i].classList.remove('autocomplete-active');
          }
        }

        // 입력 이벤트
        searchInput.addEventListener('input', function () {
          createAutocomplete(this.value);
        });

        // 문서 클릭 시 자동완성 목록 닫기
        document.addEventListener('click', function (e) {
          closeAllLists(e.target);
        });

        // 검색 함수
        function performSearch() {
          const searchText = searchInput.value
            .trim()
            .toLowerCase()
            .replace(/\s+/g, '');
          if (!searchText) {
            alert('검색어를 입력해주세요.');
            return;
          }

          let found = false;
          stations.forEach((station) => {
            const stationText = station.title.toLowerCase().replace(/\s+/g, '');
            if (stationText.includes(searchText)) {
              found = true;
              moveToStation(station);
            }
          });

          if (!found) {
            alert('검색 결과가 없습니다.');
          }
        }

        // 검색 버튼 클릭 이벤트
        searchButton.addEventListener('click', performSearch);
      });
    </script>
